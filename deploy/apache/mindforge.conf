# ============================================================
# Mindforge — Apache HTTP Server Configuration
# ============================================================
#
# This config serves all 4 Mindforge web apps from a single server.
# Apache serves the frontend static files and proxies API requests
# to the NestJS backends running on localhost.
#
# INSTALLATION:
#   macOS:  brew install httpd
#   Ubuntu: sudo apt install apache2
#
# ENABLE MODULES (required):
#   macOS:  Edit /opt/homebrew/etc/httpd/httpd.conf — uncomment the LoadModule lines for:
#   Ubuntu: sudo a2enmod proxy proxy_http rewrite headers
#
#     LoadModule proxy_module lib/httpd/modules/mod_proxy.so
#     LoadModule proxy_http_module lib/httpd/modules/mod_proxy_http.so
#     LoadModule rewrite_module lib/httpd/modules/mod_rewrite.so
#     LoadModule headers_module lib/httpd/modules/mod_headers.so
#
# USAGE:
#   1. Copy this file to Apache's config directory
#      macOS:  cp deploy/apache/mindforge.conf /opt/homebrew/etc/httpd/extra/
#              Then add: Include /opt/homebrew/etc/httpd/extra/mindforge.conf
#              to /opt/homebrew/etc/httpd/httpd.conf
#      Ubuntu: sudo cp deploy/apache/mindforge.conf /etc/apache2/sites-available/
#              sudo a2ensite mindforge
#
#   2. Update MINDFORGE_ROOT below to your actual project path
#
#   3. Restart Apache
#      macOS:  brew services restart httpd
#      Ubuntu: sudo systemctl restart apache2
#
# ACCESS URLS (replace SERVER_IP with your machine's IP):
#   http://SERVER_IP:8001  → Student App
#   http://SERVER_IP:8002  → Parent App
#   http://SERVER_IP:8003  → Teacher App
#   http://SERVER_IP:8004  → Admin App
#   http://SERVER_IP:8080  → Landing Page (links to all apps)
# ============================================================

# >>> CHANGE THIS to your actual Mindforge project path <<<
Define MINDFORGE_ROOT /Users/prayash/Project/Mindforge

# Listen on additional ports for each app
Listen 8001
Listen 8002
Listen 8003
Listen 8004
Listen 8080

# ── Landing Page (port 8080) ──────────────────────────────
<VirtualHost *:8080>
    DocumentRoot "${MINDFORGE_ROOT}/deploy/landing"

    <Directory "${MINDFORGE_ROOT}/deploy/landing">
        Options -Indexes
        Require all granted
    </Directory>

    ErrorLog "/var/log/mindforge-landing-error.log"
</VirtualHost>

# ── Student App (port 8001) ───────────────────────────────
<VirtualHost *:8001>
    DocumentRoot "${MINDFORGE_ROOT}/apps/student/frontend/dist"

    <Directory "${MINDFORGE_ROOT}/apps/student/frontend/dist">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    # Proxy API requests to Student backend (port 3000)
    ProxyPreserveHost On
    ProxyPass        /v1     http://localhost:3000/v1
    ProxyPassReverse /v1     http://localhost:3000/v1
    ProxyPass        /health http://localhost:3000/health
    ProxyPassReverse /health http://localhost:3000/health
    ProxyPass        /api    http://localhost:3000/api
    ProxyPassReverse /api    http://localhost:3000/api

    Header set Access-Control-Allow-Origin "*"
    ErrorLog "/var/log/mindforge-student-error.log"
</VirtualHost>

