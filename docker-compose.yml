# Mindforge — PostgreSQL for all backends (Admin, Student, Teacher, Parent)
# Run: docker compose up -d
# Creates: mindforge_admin, mindforge, mindforge_teacher, mindforge_parent

services:
  postgres:
    image: postgres:16-alpine
    container_name: mindforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mindforge_admin
    ports:
      - "5432:5432"
    volumes:
      - mindforge_pgdata:/var/lib/postgresql/data
      - ./docker/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mindforge_pgdata:
